name: LTX Hindi Shorts Pipeline

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if daily limit reached'
        required: false
        default: 'false'
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ltx-${{ hashFiles('requirements_ci.txt') }}

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Write credentials from secrets
        env:
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          YT_CLIENT_JSON: ${{ secrets.YT_CLIENT_JSON }}
        run: |
          mkdir -p music output/temp logs
          echo "$GDRIVE_TOKEN_JSON" > drive_token.json
          echo "$YT_CLIENT_JSON" > yt_client_secret.json

      - name: Download state from Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python drive_manager.py download_state

      - name: Write YT token (always wins over Drive version)
        env:
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: echo "$YT_TOKEN_JSON" > yt_token.json

      - name: Run pipeline
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: python pipeline_ci.py

      - name: Upload state to Google Drive
        if: always()
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python drive_manager.py upload_state

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import requests, os
          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat  = os.environ.get('TELEGRAM_CHAT_ID', '')
          run_id = os.environ.get('GITHUB_RUN_ID', '')
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          if token and chat:
              msg = (
                  'LTX Pipeline FAILED\n'
                  f'Run: {run_id}\n'
                  f'Logs: https://github.com/{repo}/actions/runs/{run_id}'
              )
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat, 'text': msg},
                  timeout=10
              )
          PYEOF
