name: LTX Hindi Shorts Pipeline v2

on:
  schedule:
    - cron: '0 3 * * *'    # 8:30 AM IST
    - cron: '0 6 * * *'    # 11:30 AM IST
    - cron: '0 9 * * *'    # 2:30 PM IST
    - cron: '0 12 * * *'   # 5:30 PM IST
    - cron: '0 15 * * *'   # 8:30 PM IST
    - cron: '0 18 * * *'   # 11:30 PM IST

  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if daily limit reached'
        required: false
        default: 'false'

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # LTX-Video can take 10-15 min per clip in queue

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ltx-${{ hashFiles('requirements_ci.txt') }}

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Write credentials from secrets
        env:
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          YT_CLIENT_JSON:    ${{ secrets.YT_CLIENT_JSON }}
        run: |
          mkdir -p music output/temp logs
          echo "$GDRIVE_TOKEN_JSON" > drive_token.json
          echo "$YT_CLIENT_JSON"    > yt_client_secret.json

      - name: Download state from Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python drive_manager.py download_state

      - name: Write YT token (always wins over Drive version)
        env:
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: echo "$YT_TOKEN_JSON" > yt_token.json

      - name: Run pipeline
        env:
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          FORCE_RUN:          ${{ github.event.inputs.force_run }}
        run: python pipeline_ci.py

      - name: Upload state to Google Drive
        if: always()
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python drive_manager.py upload_state

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
import requests, os
token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
chat  = os.environ.get('TELEGRAM_CHAT_ID', '')
if token and chat:
    msg = (
        '❌ *LTX Pipeline Failed*\n'
        'Run ID: \`${{ github.run_id }}\`\n'
        'Trigger: ${{ github.event_name }}\n'
        'Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
    )
    requests.post(
        f'https://api.telegram.org/bot{token}/sendMessage',
        json={'chat_id': chat, 'text': msg, 'parse_mode': 'Markdown'},
        timeout=10
    )
"
